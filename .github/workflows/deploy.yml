name: Deploy FileMint

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/fileMint/Filemint
            git pull origin main
            docker stop filemint-container || true
            docker rm filemint-container || true
            docker build -t filemint-app .
            docker run -d \
              --name filemint-container \
              -p 3001:3000 \
              --restart unless-stopped \
              filemint-app